<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan</title>
    <script src="https://cdn.rawgit.com/caldwell/renderjson/master/renderjson.js"></script>
    <style>
        table {
            border: 1px solid;
            border-collapse: collapse;
            margin: 30px;
        }
        table td, table th {
            border-left: 1px solid #000;
            border-right: 1px solid #000;
            padding: 8px;
        }
        table td:first-child{
            border-left: none;
        }
        table td:last-child {
            border-right: none;
        }
    </style>
</head>
<body>

    <h1>Plan View</h1>
    <h3>Create Plan</h3>
    <label for="plan_name">Name: </label>
    <input id="plan_name"/>
    <br>
    <label for="plan_target_start">Target Start Date (e.g. 2026-05-01T10:00:00): </label>
    <input id="plan_target_start"/>
    <br>
    <label for="plan_protocol_id"> (-1 if wanting to start from scratch)</label>
    <input id="plan_protocol_id" value="-1"/>
    <br>
    <label for="plan_party">Party: </label>
    <input id="plan_party"/>
    <br>
    <label for="plan_location">Location: </label>
    <input id="plan_location"/>
    <br>
    <button onclick="submitPlan()">Create Plan</button>
    <br>
    <br>
    <h3>View Plan Tree</h3>
    <label for="plan_id">Plan ID: </label>
    <input id="plan_id"/>
    <button onclick="getPlan()">Load Plan</button>
    <br>
    <br>
    <div id="plan_tree"></div>
    <h3>View Plan IDs</h3>
    <table>
        <thead>
            <tr>
                <th>Plan ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody id="plans_list"></tbody>
    </table>

    <script>
        function checkEmpty(val) {
            return val.trim() == "";
        }

        async function submitPlan() {
            let name = document.getElementById("plan_name").value;
            let targetStartDate = document.getElementById("plan_target_start").value;
            let protocolId = document.getElementById("plan_protocol_id").value;
            let party = document.getElementById("plan_party").value;
            let location = document.getElementById("plan_location").value;

            if (checkEmpty(name) || checkEmpty(targetStartDate)) {
                alert("Name and Target Start Date are required!");
            } else if (protocolId != -1 && (checkEmpty(party) || checkEmpty(location))) {
                alert("Party and Location are required when creating from a protocol!");
            } else {
                let host = "https://project4-backend-84hx.onrender.com";
                let formData = new FormData();
                formData.append("name", name);
                formData.append("targetStartDate", targetStartDate);
                formData.append("protocolId", protocolId);
                formData.append("party", party);
                formData.append("location", location);

                let request = { method: "POST", body: formData };
                let response = await fetch(host + "/api/plans", request);

                if (response.status == 200) {
                    alert("Plan successfully created!");
                    document.getElementById("plan_name").value = "";
                    document.getElementById("plan_target_start").value = "";
                    document.getElementById("plan_protocol_id").value = "-1";
                    document.getElementById("plan_party").value = "";
                    document.getElementById("plan_location").value = "";
                } else {
                    let msg = await response.text();
                    alert(msg);
                }
            }
        }

        async function getPlan() {
            let id = document.getElementById("plan_id").value;

            if (checkEmpty(id)) {
                alert("Please enter a Plan ID!");
            } else {
                let host = "https://project4-backend-84hx.onrender.com";
                let response = await fetch(host + "/api/plans/" + id);

                if (response.status == 200) {
                    let plan = await response.json();
                    let container = document.getElementById("plan_tree");
                    container.innerHTML = "";
                    container.appendChild(renderjson(recurseNode(plan)));
                } else {
                    let msg = await response.text();
                    alert(msg);
                }
            }
        }

        function recurseNode(node) {
            let json_data_ans = {
                name: node.name,
                type: node.type,
                status: node.status,
                children: []
            };
            if (node.type == "PLAN" && node.children) {
                for (const child of node.children) {
                    json_data_ans.children.push(recurseNode(child));
                }
            }
            return json_data_ans;    
        }
        
        async function getPlans() {
            let host = "https://project4-backend-84hx.onrender.com";
            let response = await fetch(host + "/api/plans");
            let result = await response.json();
            let table = document.getElementById("plans_list");
            table.innerHTML = "";

            for (const plan of result) {
                let row = document.createElement("tr");

                let cell1 = document.createElement("td");
                cell1.textContent = plan.plan_node_id;
                row.appendChild(cell1);

                let cell2 = document.createElement("td");
                cell2.textContent = plan.name;
                row.appendChild(cell2);

                table.appendChild(row);
            }
        }

        getPlans();
        setInterval(getPlans, 3000);
    </script>

</body>
</html>
