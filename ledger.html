<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledger</title>
    <style>
        table {
            border: 1px solid;
            border-collapse: collapse;
            margin: 30px;
        }
        table td, table th {
            border-left: 1px solid #000;
            border-right: 1px solid #000;
            padding: 8px;
        }
        table td:first-child{
            border-left: none;
        }
        table td:last-child {
            border-right: none;
        }
    </style>
</head>
<body>

    <h1>Ledger View</h1>
    <h3>View All Accounts</h3>
    <table>
        <thead>
            <tr>
                <th>Account ID</th>
                <th>Name</th>
                <th>Kind</th>
                <th>Balance</th>
                <th>Alert</th>
            </tr>
        </thead>
        <tbody id="accounts_list"></tbody>
    </table>
    <h3>View Entries by Account</h3>
    <label for="entry_account_id">Account ID: </label>
    <input id="entry_account_id"/>
    <button onclick="getEntries()">Get Entries</button>
    <br>
    <br>
    <table>
        <thead>
            <tr>
                <th>Entry ID</th>
                <th>Amount</th>
                <th>Charged At</th>
                <th>Booked At</th>
            </tr>
        </thead>
        <tbody id="entries_list"></tbody>
    </table>

    <script>
    function checkEmpty(val) {
        return val.trim() === "";
    }

    async function getEntries() {
        let id = document.getElementById("entry_account_id").value;

        if (checkEmpty(id)) {
            alert("Please enter an Account ID!");
        } else {
            let host = "https://project4-backend-84hx.onrender.com";
            let response = await fetch(host + "/api/accounts/" + id + "/entries");

            if (response.status == 200) {
                let result = await response.json();
                let table = document.getElementById("entries_list");
                table.innerHTML = "";

                for (const entry of result) {
                    let row = document.createElement("tr");

                    let cell1 = document.createElement("td");
                    cell1.textContent = entry.entry_id;
                    row.appendChild(cell1);

                    let cell2 = document.createElement("td");
                    cell2.textContent = entry.amount;
                    row.appendChild(cell2);

                    let cell3 = document.createElement("td");
                    cell3.textContent = entry.chargedAt;
                    row.appendChild(cell3);

                    let cell4 = document.createElement("td");
                    cell4.textContent = entry.bookedAt;
                    row.appendChild(cell4);

                    table.appendChild(row);
                }
            } else {
                let msg = await response.text();
                alert(msg);
            }
        }
    }
    </script>

    <script>
        async function getAccounts() {
            let host = "https://project4-backend-84hx.onrender.com";
            let accountsResponse = await fetch(host + "/api/accounts");
            let accounts = await accountsResponse.json();
            let table = document.getElementById("accounts_list");
            table.innerHTML = "";

            for (const account of accounts) {
                let balanceResponse = await fetch(host + "/api/accounts/" + account.account_id + "/balance");
                let balance = await balanceResponse.json();

                let row = document.createElement("tr");

                let cell1 = document.createElement("td");
                cell1.textContent = account.account_id;
                row.appendChild(cell1);

                let cell2 = document.createElement("td");
                cell2.textContent = account.name;
                row.appendChild(cell2);

                let cell3 = document.createElement("td");
                cell3.textContent = account.kind;
                row.appendChild(cell3);

                let cell4 = document.createElement("td");
                cell4.textContent = balance;
                row.appendChild(cell4);

                let cell5 = document.createElement("td");
                if(balance < 0){
                    cell5.textContent = "ALERT";
                }
                row.appendChild(cell5);

                table.appendChild(row);
            }
        }

        getAccounts();
        setInterval(getAccounts, 3000);
    </script>

</body>
</html>
